# Different models for different steps
step_models:
  RubricsAgent:
    name: "deepseek-ai/DeepSeek-V4-Flash"
    api_base: "https://api.siliconflow.cn/v1"
    api_key_env: "SILICONFLOW_API_KEY"
    max_tokens: 40000
    temperature: 0.9
    solution_top_k: 3

processing:
  max_workers: 1
  max_tasks: 10000

logging:
  already_processed_path: "../logs/solved_rubrics.jsonl"

paths:
  solution_path: "../output/solve_tool_use/"
