# Different models for different steps
step_models:
  ToolSetGenAgent:
    name: "qwen3-235b-a22b-instruct-2507"
    api_base: "Qwen3_235B_A22B_Instruct_ADDRESS_bailian"
    api_key_env: "Qwen3_235B_A22B_Instruct_API_KEY_bailian"
    max_tokens: 10240
    temperature: 0.9
    use_thinking: false
  FuzzyTaskAgent:
    name: "qwen3-235b-a22b-instruct-2507"
    api_base: "Qwen3_235B_A22B_Instruct_ADDRESS_bailian"
    api_key_env: "Qwen3_235B_A22B_Instruct_API_KEY_bailian"
    max_tokens: 10240
    temperature: 0.9
    use_thinking: false
  ToolCheckAgent:
    name: "qwen3-235b-a22b-instruct-2507"
    api_base: "Qwen3_235B_A22B_Instruct_ADDRESS_bailian"
    api_key_env: "Qwen3_235B_A22B_Instruct_API_KEY_bailian"
    max_tokens: 10240
    temperature: 0.9
    use_thinking: false
  SolveAgent:
    name: "qwen3-235b-a22b-instruct-2507"
    api_base: "Qwen3_235B_A22B_Instruct_ADDRESS_bailian"
    api_key_env: "Qwen3_235B_A22B_Instruct_API_KEY_bailian"
    max_tokens: 10240
    temperature: 0.9
