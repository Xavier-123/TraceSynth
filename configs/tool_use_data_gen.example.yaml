  MockUserAgent:
    name: "qwen3-235b-a22b-instruct-2507"
    api_base: "Qwen3_235B_A22B_Instruct_ADDRESS_bailian"
    api_key_env: "Qwen3_235B_A22B_Instruct_API_KEY_bailian"
    max_tokens: 10240
    temperature: 0.9
    use_thinking: false

processing:
  max_workers: 1
  max_tasks: 2
  retry_failed_tasks: true

retry:
  api_max_retries: 3
  api_retry_base: 1.0
  parse_max_retries: 2
  tool_call_max_retries: 3

logging:
  task_file_path: "../output/virtual_tool_use.jsonl"
  failed_task_file_path: "../output/virtual_tool_use.failed.jsonl"
  solve_path: "../output/solve_tool_use/"

evaluation:
  skip_label_match: false
  use_label_as_answer: true

input:
  question_fields: ["question", "query"]
  label_fields: ["label", "answer", "gold"]
  context_field: "context"
  id_field: "id"
  dataset_split: "test"
  legacy_persona_mode: false

paths:
  data_file: "../configs/persona_5K.jsonl"

# Agentic RAG 数据合成复杂度（6 步流程，4 个参数）
synthesis:
  task_complexity:
    num_tools: "4~6"
    num_custom_tools: "1"
    distractor_tools: "1~2"
  iteration_complexity:
    max_iterations: "1~2"
