# Different models for different steps
step_models:
  ToolSetGenAgent:
    name: "qwen3-235b-a22b-instruct-2507"
    max_tokens: 10240
    temperature: 0.9
  FuzzyTaskAgent:
    name: "qwen3-235b-a22b-instruct-2507"
    max_tokens: 10240
    temperature: 0.9
  ToolCheckAgent:
    name: "qwen3-235b-a22b-instruct-2507"
    max_tokens: 10240
    temperature: 0.9
  SolveAgent:
    name: "qwen3-235b-a22b-instruct-2507"
    max_tokens: 10240
    temperature: 0.9
  MockToolAgent:
    name: "qwen3-235b-a22b-instruct-2507"
    max_tokens: 10240
    temperature: 0.9
  MockUserAgent:
    name: "qwen3-235b-a22b-instruct-2507"
    max_tokens: 10240
    temperature: 0.9

processing:
  max_workers: 1
  max_tasks: 2

logging:
  task_file_path: "../output/virtual_tool_use.jsonl"
  failed_task_file_path: "../output/virtual_tool_use.failed.jsonl"
  solve_path: "../output/solve_tool_use/"

paths:
  data_file: "../configs/persona_5K.jsonl"

api_configs:
  "Qwen3-235B-A22B-Instruct-2507":
    api_base: "Qwen3_235B_A22B_Instruct_ADDRESS"
    api_key_env: "Qwen3_235B_A22B_Instruct_API_KEY"
  "qwen3-235b-a22b-instruct-2507":
    api_base: "Qwen3_235B_A22B_Instruct_ADDRESS_bailian"
    api_key_env: "Qwen3_235B_A22B_Instruct_API_KEY_bailian"
  "Local":
    api_base: "http://0.0.0.0:8000/v1"
    api_key_env: EMPTY

# Agentic RAG 数据合成复杂度
synthesis:
  task_complexity:
    num_tools: "1~2"
    num_tool_categories: "2~2"
    num_pipeline_stages: "2~4"
    num_custom_tools: "1"
    distractor_tools: "1~2"
  iteration_complexity:
    retrieval_rounds: "0~1"
    info_gaps: "1~2"